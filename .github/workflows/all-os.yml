name: All OS
on: [push, pull_request]

jobs:
  apple-clang:
    name: AppleClang ${{ matrix.xcode }} MacOS C++${{ matrix.cxx }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]
        xcode: [16.0, 16.1, 16.2, 16.3, 16.4, 26.0]
        cxx: [20, 23, 26]
        exclude:
          - os: macos-15
            xcode: 26.0
          - os: macos-15
            xcode: 26.1
          - os: macos-26
            xcode: 16.0
          - os: macos-26
            xcode: 16.1
          - os: macos-26
            xcode: 16.2
          - os: macos-26
            xcode: 16.3
          - os: macos-26
            xcode: 16.4

    steps:
      - uses: actions/checkout@v5

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: get-cmake
        uses: lukka/get-cmake@v4.1.2

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11

      - name: 'run cmake'
        uses: lukka/run-cmake@v10
        with:
          configurepreset: 'ci-macos'
          buildpreset: 'ci-macos'
          testpreset: 'ci-macos'
          configurePresetAdditionalArgs: "['-DCMAKE_CXX_STANDARD=${{ matrix.cxx }}']"

  linux-old-clang:
    name: Clang ${{ matrix.clang }} Linux C++${{ matrix.cxx }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        clang: [16, 17]
        cxx: [20]

    steps:
      - uses: actions/checkout@v5

      - uses: lukka/get-cmake@v4.1.2

      - name: Set up Clang
        uses: egor-tensin/setup-clang@v1
        with:
          version: ${{ matrix.clang }}
          platform: x64

      - name: Setup Clang Tools
        run: sudo apt install -y clang-tools-${{ matrix.clang }}

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11

      - name: 'Run CMake'
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'ci-linux'
          buildPreset: 'ci-linux'
          testPreset: 'ci-linux'
          configurePresetAdditionalArgs: "['-DCMAKE_CXX_STANDARD=${{ matrix.cxx }}']"

  linux-clang:
    name: Clang ${{ matrix.clang }} Linux C++${{ matrix.cxx }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        clang: [18, 19, 20, 21]
        cxx: [20, 23, 26]

    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: nicknovitski/nix-develop@v1
        with:
          arguments: ".#ci-clang${{ matrix.clang }}"

      - name: 'Run CMake'
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'ci-linux'
          buildPreset: 'ci-linux'
          testPreset: 'ci-linux'
          configurePresetAdditionalArgs: "['-DCMAKE_CXX_STANDARD=${{ matrix.cxx }}']"

  linux-old-gcc:
    name: GCC ${{ matrix.gcc }} Linux C++${{ matrix.cxx }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        gcc: [11, 12]
        cxx: [20, 23]
        exclude:
          - gcc: 11
            cxx: 23

    steps:
      - uses: actions/checkout@v5

      - uses: lukka/get-cmake@v4.1.2

      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: ${{ matrix.gcc }}
          platform: x64

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11

      - name: 'Run CMake'
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'ci-linux'
          buildPreset: 'ci-linux'
          testPreset: 'ci-linux'
          configurePresetAdditionalArgs: "['-DCMAKE_CXX_STANDARD=${{ matrix.cxx }}']"

  linux-gcc:
    name: GCC ${{ matrix.gcc }} Linux C++${{ matrix.cxx }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gcc: [13, 14, 15]
        cxx: [20, 23, 26]
        exclude:
          - gcc: 13
            cxx: 26

    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: nicknovitski/nix-develop@v1
        with:
          arguments: ".#ci-gcc${{ matrix.gcc }}"

      - name: 'Run CMake'
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'ci-linux'
          buildPreset: 'ci-linux'
          testPreset: 'ci-linux'
          configurePresetAdditionalArgs: "['-DCMAKE_CXX_STANDARD=${{ matrix.cxx }}']"

  windows-msvc:
    runs-on: windows-latest
    name: MSVC ${{ matrix.msvc-version }} Windows C++${{ matrix.cxx }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        arch: [x64]
        cxx: [20, 23]

    steps:
      - uses: actions/checkout@v5

      - uses: egor-tensin/vs-shell@v2
        with:
          arch: ${{ matrix.arch }}

      - name: get-cmake
        uses: lukka/get-cmake@v4.1.2

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Location of the vcpkg as submodule of the repository.
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          useVcpkgToolchainFile: true
          # Since the cache must be invalidated when content of the vcpkg.json file changes, let's
          # compute its hash and append this to the computed cache's key.
          appendedCacheKey: ${{ hashFiles( '**/vcpkg.json' ) }}

      - name: 'Run CMake'
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'ci-windows'
          buildPreset: 'ci-windows'
          testPreset: 'ci-windows'
          configurePresetAdditionalArgs: "['-DCMAKE_CXX_STANDARD=${{ matrix.cxx }}']"

